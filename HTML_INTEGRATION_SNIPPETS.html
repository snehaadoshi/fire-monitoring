<!-- ============================================
     STEP 5: Add Connection Status Indicator (Optional)
     Location: In leftPanel or menuBlock
     ============================================ -->
<div id="connectionStatus" style="padding:10px; background:#f3f4f6; border-radius:8px; margin-bottom:10px; display:none;">
    <span id="wsStatus">🔴 Connecting...</span>
</div>

<script>
// Update in websocket-client.js socket.on('connect'):
socket.on('connect', () => {
    document.getElementById('wsStatus').innerHTML = '🟢 Real-time Connected';
    document.getElementById('connectionStatus').style.display = 'block';
});

socket.on('disconnect', () => {
    document.getElementById('wsStatus').innerHTML = '🟡 Using Polling Mode';
});
</script>
